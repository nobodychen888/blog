# Hexo 核心配置文件
# 详解文档: https://hexo.io/docs/configuration.html

# 网站基础设置
title: 大义今朝          # 网站标题
subtitle: '感谢AI，能让小白感受做大佬的快乐'                # 网站副标题
description: '探索VPS服务器搭建、网络安全协议、AI应用、教程，期货交易；记录从技术新手到进阶的成长历程，交易为生是我的梦想，偶尔也扯一下无聊的生活日常'             # 网站描述（对 SEO 有帮助）
keywords: 'VPS, 交易、网络协议, AI玩技术, SEO优化, 扯生活, Cloudflare, 技术教程, 大义今朝'                   # 网站关键词
author: 大义今朝           # 作者名字
language: zh-CN             # 语言设置（建议改为 zh-CN 以支持中文界面）
timezone: 'Asia/Shanghai'   # 时区设置

# 网站 URL 设置
url: https://vx258.com      # 你的网站网址
permalink: :year/:month/:day/:title/  # 文章链接格式
permalink_defaults:
pretty_urls:
  trailing_index: true 
  trailing_html: true 

# 目录设置
source_dir: source          # 源码文件夹
public_dir: public          # 生成的静态网页文件夹
tag_dir: tags               # 标签目录
archive_dir: archives      # 分类目录
category_dir: categories     # 路径根目录
code_dir: downloads/code
i18n_dir: :lang
skip_render:                # 跳过渲染的文件/文件夹

# 文章写作设置
new_post_name: :title.md    # 新文章的默认文件名
default_layout: post        # 默认布局
titlecase: false 
external_link:
  enable: true 
  field: site 
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true    # 是否开启资源文件夹（文章内插图建议开启）
relative_link: false
future: true
syntax_highlighter: highlight.js # 代码高亮工具

# 代码高亮详细配置
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# 首页设置
index_generator:
  path: ''
  per_page: 10              # 首页每页显示多少篇文章
  order_by: -date           # 按日期倒序排列

# 分类与标签
default_category: uncategorized
category_map:
tag_map:

# 元数据
meta_generator: true

# 时间日期格式
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# 分页设置
per_page: 10
pagination_dir: page

# 主题设置 (非常重要！)
# 请确保 themes/ 文件夹下确实有一个文件夹叫 hexo-theme-ayer-master
# 如果你把文件夹改名为 ayer，这里也要改成 theme: ayer
theme: hexo-theme-ayer-master

# 部署设置 (Cloudflare Pages 模式下这里通常留空，因为是通过 Git 触发的)
deploy:
  type: ''